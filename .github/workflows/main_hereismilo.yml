name: Build and deploy ASP.Net Core app to Azure Web App - hereismilo

on:
  push:
    branches:
      - main
  workflow_dispatch:

# We define the path to your project once here to use below
env:
  PROJECT_PATH: 'portfolio/portfolio' 

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x' # Using stable 8.0

      - name: Build with dotnet
        # FIXED: Added the path to your project folder
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release

      - name: dotnet publish
        # FIXED: Added the path to your project folder
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write 
      contents: read 

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish # Explicit path for the download
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B3FE3A1758344B34B242549218D487E7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_131929EEA80742359D0EC58D9F5EDAF3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4B3C143A13C94697B5E09C46A8851B3D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hereismilo'
          slot-name: 'Production'
          # FIXED: Pointing to the downloaded 'publish' folder
          package: ./publish
